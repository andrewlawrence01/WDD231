<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Improved User Experience</title>
  <link rel="stylesheet" href="goodUx.css">
</head>

<body>

<header>
  <h1>Welcome to Our Website</h1>
  <p class="intro">
    This page demonstrates how improving layout, readability, accessibility,
    and navigation can significantly improve user experience.
  </p>
</header>

<main>

  <img src="ux-good.jpg" alt="Clean example of good user experience design">

  <section class="list-section">
    <h2>Example List</h2>

    <ul>
      <li>This</li>
      <li>is</li>
      <li>a</li>
      <li>shorter</li>
      <li>and</li>
      <li>better</li>
      <li>structured</li>
      <li>list</li>
    </ul>

    <div class="pagination">
      <button>Previous</button>
      <button class="active">1</button>
      <button>2</button>
      <button>3</button>
      <button>Next</button>
    </div>

  </section>

  <section class="form-section">

    <h2>Stay Updated</h2>

    <form>
      <label for="name">Enter your name to subscribe for updates:</label>
      <input id="name" type="text" placeholder="Your name">

      <button type="submit">Subscribe</button>
    </form>

  </section>

</main>

</body>
</html>
